<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WALTZ ONLINE SHOP</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 0;
    }
    header {
      background: #003366;
      color: #fff;
      padding: 20px;
      text-align: center;
    }
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 30px auto;
      padding: 0 20px;
    }
    .product {
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 15px;
      text-align: center;
    }
    .product img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 5px;
    }
    .product h3 {
      margin: 10px 0;
      color: #003366;
    }
    .product p {
      font-weight: bold;
    }
    .product button {
      background: #003366;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
    }
    footer {
      text-align: center;
      padding: 20px;
      background: #003366;
      color: white;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <header>
    <h1>WALTZ ONLINE SHOP</h1>
    <p>Quality Items at Affordable Prices</p>
  </header>

  <div class="container">
    <div class="product">
      <img src="images/shoe.jpg" alt="Shoes" />
      <h3>Classic Shoes</h3>
      <p>₦12,000</p>
      <button>Add to Cart</button>
    </div>

    <div class="product">
      <img src="images/bag.jpg" alt="Bag" />
      <h3>Leather Bag</h3>
      <p>₦8,500</p>
      <button>Add to Cart</button>
    </div>

    <div class="product">
      <img src="images/watch.jpg" alt="Watch" />
      <h3>Men's Wristwatch</h3>
      <p>₦15,000</p>
      <button>Add to Cart</button>
    </div>

    <div class="product">
      <img src="images/laptop.jpg" alt="Laptop" />
      <h3>HP Laptop</h3>
      <p>₦250,000</p>
      <button>Add to Cart</button>
    </div>

    <div class="product">
      <img src="images/phone.jpg" alt="Phone" />
      <h3>Android Smartphone</h3>
      <p>₦90,000</p>
      <button>Add to Cart</button>
    </div>

    <div class="product">
      <img src="images/necklace.jpg" alt="Necklace" />
      <h3>Gold Necklace</h3>
      <p>₦35,000</p>
      <button>Add to Cart</button>
    </div>
  </div>

  <footer>
    <p>&copy; 2025 WALTZ ONLINE SHOP. All rights reserved.</p>
  </footer>
</body>
</html>
