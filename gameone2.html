<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GAMEONE - 100 Ball Game</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      color: #fff;
      text-align: center;
    }
    h1 {
      margin-top: 20px;
      font-size: 2em;
      color: #f1c40f;
    }
    .game-box {
      background: rgba(0, 0, 0, 0.6);
      border-radius: 10px;
      padding: 30px;
      max-width: 800px;
      margin: 40px auto;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }
    .numbers {
      margin: 20px 0;
    }
    .number {
      display: inline-block;
      background: #f39c12;
      margin: 5px;
      padding: 15px;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      font-weight: bold;
    }
    button {
      background-color: #e67e22;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 5px;
      font-size: 1em;
      cursor: pointer;
    }
    button:disabled {
      background-color: #999;
      cursor: not-allowed;
    }
    .schedule {
      margin-top: 20px;
    }
    .admin-box {
      margin-top: 40px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }
    input[type="number"] {
      padding: 5px;
      width: 50px;
      margin: 0 5px;
    }
  </style>
</head>
<body>
  <h1>GAMEONE - 100 Ball Game</h1>

  <div class="game-box">
    <p><strong>Game Times:</strong> 10:30am, 2:30pm, 4:00pm, 8:00pm, 8:30pm</p>
    <button id="playBtn" onclick="playGame()">Play Game</button>

    <div class="numbers">
      <h3>Your Winning Numbers</h3>
      <div id="winningNumbers"></div>
    </div>

    <div class="numbers">
      <h3>Your Machine Numbers</h3>
      <div id="machineNumbers"></div>
    </div>
  </div>

  <div class="admin-box">
    <h2>Admin Panel</h2>
    <p>Set Winning and Machine Numbers</p>
    <div>
      Winning: <input type="text" id="adminWinning" placeholder="e.g. 4,8,23,44,60" />
      Machine: <input type="text" id="adminMachine" placeholder="e.g. 5,11,20,38,77" />
      <button onclick="setAdminNumbers()">Set Numbers</button>
    </div>
    <div class="numbers">
      <h4>Admin Winning Numbers</h4>
      <div id="adminWinningNumbers"></div>
    </div>
    <div class="numbers">
      <h4>Admin Machine Numbers</h4>
      <div id="adminMachineNumbers"></div>
    </div>
  </div>

  <script>
    const gameTimes = ["10:30", "14:30", "16:00", "20:00", "20:30"];
    let gamePlayed = false;

    function getCurrentGameTime() {
      const now = new Date();
      const hour = now.getHours().toString().padStart(2, '0');
      const minute = now.getMinutes().toString().padStart(2, '0');
      return `${hour}:${minute}`;
    }

    function isGameTimeActive() {
      const now = new Date();
      const currentTime = getCurrentGameTime();
      return gameTimes.some(t => {
        const [h, m] = t.split(":").map(Number);
        const gameDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m);
        return now < gameDate;
      });
    }

    function getRandomNumbers(count, max) {
      const numbers = new Set();
      while (numbers.size < count) {
        numbers.add(Math.floor(Math.random() * max) + 1);
      }
      return Array.from(numbers);
    }

    function displayNumbers(containerId, numbers) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      numbers.forEach(num => {
        const el = document.createElement('div');
        el.className = 'number';
        el.textContent = num;
        container.appendChild(el);
      });
    }

    function playGame() {
      if (gamePlayed) {
        alert("You can only play once before the next game time.");
        return;
      }

      if (!isGameTimeActive()) {
        alert("Game is closed. Try before the next game time.");
        return;
      }

      gamePlayed = true;
      const winning = getRandomNumbers(5, 100);
      const machine = getRandomNumbers(5, 100);
      displayNumbers('winningNumbers', winning);
      displayNumbers('machineNumbers', machine);
    }

    function setAdminNumbers() {
      const winInput = document.getElementById('adminWinning').value;
      const machInput = document.getElementById('adminMachine').value;
      const winNums = winInput.split(',').map(n => parseInt(n.trim()));
      const machNums = machInput.split(',').map(n => parseInt(n.trim()));
      displayNumbers('adminWinningNumbers', winNums);
      displayNumbers('adminMachineNumbers', machNums);
    }
  </script>
</body>
</html>
