<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GAMEONE - 100 Ball Gaming</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to bottom, #001a33, #004466);
      color: #fff;
      text-align: center;
    }
    header {
      padding: 30px;
      background: #000;
    }
    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }
    section {
      margin: 30px 0;
      background: #ffffff10;
      padding: 20px;
      border-radius: 10px;
    }
    h2 {
      color: #00ccff;
    }
    input, select, button {
      padding: 10px;
      margin: 10px;
      border: none;
      border-radius: 5px;
    }
    button {
      background: #00ccff;
      color: #000;
      cursor: pointer;
    }
    .ball {
      display: inline-block;
      width: 40px;
      height: 40px;
      margin: 5px;
      line-height: 40px;
      border-radius: 50%;
      background: #fff;
      color: #000;
      font-weight: bold;
      animation: flash 1s infinite alternate;
    }
    @keyframes flash {
      from { background-color: #fff; }
      to { background-color: #00ccff; color: #fff; }
    }
  </style>
</head>
<body>
  <header>
    <h1>GAMEONE</h1>
    <p>100 Ball Game - Try Your Luck!</p>
  </header>

  <div class="container">
    <section>
      <h2>Play Game</h2>
      <form id="playForm">
        <label>Select Game Time:</label>
        <select name="gameTime" required>
          <option value="">-- Choose --</option>
          <option>10:30am</option>
          <option>2:30pm</option>
          <option>4:00pm</option>
          <option>8:00pm</option>
          <option>8:30pm</option>
        </select><br>
        <label>Select 5 Numbers (1-100):</label><br>
        <input type="text" name="numbers" placeholder="e.g., 5,12,37,44,89" required><br>
        <input type="tel" name="phone" placeholder="Enter Phone Number" required><br>
        <button type="submit">Pay & Play</button>
      </form>
      <div id="receipt"></div>
    </section>

    <section>
      <h2>Admin Panel</h2>
      <button onclick="generateResults()">Generate Winning & Machine Numbers</button>
      <div id="results"></div>
    </section>

    <section>
      <h2>Submit Your Winning</h2>
      <form>
        <input type="text" placeholder="Full Name" required><br>
        <input type="number" placeholder="Age" required><br>
        <input type="tel" placeholder="Phone Number" required><br>
        <button type="submit">Submit Claim</button>
      </form>
    </section>
  </div>

  <script>
    function generateBalls() {
      const balls = [];
      while (balls.length < 5) {
        let rand = Math.floor(Math.random() * 100) + 1;
        if (!balls.includes(rand)) balls.push(rand);
      }
      return balls;
    }

    function generateResults() {
      const win = generateBalls();
      const machine = generateBalls();
      document.getElementById("results").innerHTML = `
        <h3>Winning Numbers</h3>
        ${win.map(n => `<span class='ball'>${n}</span>`).join('')}
        <h3>Machine Numbers</h3>
        ${machine.map(n => `<span class='ball'>${n}</span>`).join('')}
      `;
    }

    document.getElementById("playForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const phone = this.phone.value;
      const receipt = Math.floor(100000 + Math.random() * 900000);
      document.getElementById("receipt").innerHTML = `<p>Payment successful! Receipt No: <strong>${receipt}</strong><br>Sent to ${phone}</p>`;
      alert(`Receipt #${receipt} has been sent to ${phone}`);
      this.reset();
    });
  </script>
</body>
</html>
